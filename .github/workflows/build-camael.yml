name: Build camael
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build-camael:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v31
      - run: nix build .#nixosConfigurations.camael.config.system.build.toplevel --no-link
