name: Weekly flake update

on:
  schedule:
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - run: nix flake update
      - uses: actions/upload-artifact@v7
        with:
          name: flake-lock
          path: flake.lock

  create-pr:
    needs: update-flake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: flake-lock
          path: flake-lock
      - run: cp flake-lock/flake.lock flake.lock
      - uses: peter-evans/create-pull-request@v8
        with:
          branch: weekly-flake-update
          commit-message: Update flake inputs
          title: Update flake inputs
          body: |
            Automated weekly flake update.
